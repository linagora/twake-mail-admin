server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Content-Security-Policy: defence-in-depth against XSS. The key directive is
    # script-src without 'unsafe-inline', which blocks injected <script>/onerror=
    # handlers even if untrusted data ever reaches the DOM as HTML.
    # - unpkg.com: Leaflet JS/CSS (network-channels map)
    # - *.tile.openstreetmap.org: map tiles
    # - style 'unsafe-inline': Radix UI / Leaflet set inline style attributes
    # - connect-src is left open because the webadmin API base URL is configured
    #   at runtime (env.js) and can live on an arbitrary origin.
    set $csp "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' https://unpkg.com 'unsafe-inline'; img-src 'self' data: https://unpkg.com https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src *; object-src 'none'; base-uri 'self'; frame-ancestors 'none'";
    add_header Content-Security-Policy $csp always;

    # SPA routing — fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cache for env.js (runtime config) and index.html
    # NB: a location-level add_header drops headers inherited from the server
    # block, so the CSP is re-declared here.
    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Security-Policy $csp always;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Security-Policy $csp always;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
